<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海军标准 RAG 智能体</title>
<link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-top">
        <div class="brand">
            <span class="brand-icon">⚓</span>
            <span class="brand-text">海军标准智能助手</span>
        </div>

        <button class="btn-new-chat" onclick="newChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新对话
        </button>

        <div class="tool-list">
            <button class="tool-item" data-panel="upload" onclick="switchPanel('upload')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                上传文档
            </button>
            <button class="tool-item" data-panel="optimize" onclick="switchPanel('optimize')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                文本优化
            </button>
            <button class="tool-item" data-panel="gap" onclick="switchPanel('gap')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                查漏补缺
            </button>
            <button class="tool-item" data-panel="compliance" onclick="switchPanel('compliance')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                合规自查
            </button>
        </div>
    </div>

    <div class="sidebar-bottom">
        <div class="history-header">
            <span>历史对话</span>
            <button onclick="clearHistory()" title="清空" class="btn-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</aside>

<main class="main" id="mainArea">
    <!-- 对话页 -->
    <section class="page" id="page-chat">
        <div class="chat-wrap">
            <div class="chat-body" id="chatBody">
                <div class="welcome" id="welcomeBlock">
                    <h1>您好，我是海军标准智能助手 ⚓</h1>
                    <p class="welcome-desc">严格依托入库标准作答，杜绝编造，强制溯源</p>
                    <div class="hint-grid">
                        <button class="hint-card" onclick="sendHint('舰艇消防系统的设计要求和验收标准是什么？')">
                            <span class="hint-icon">🔍</span>
                            <span>舰艇消防系统的设计要求和验收标准是什么？</span>
                        </button>
                        <button class="hint-card" onclick="sendHint('弹药库安全管理有哪些强制性规定？')">
                            <span class="hint-icon">📋</span>
                            <span>弹药库安全管理有哪些强制性规定？</span>
                        </button>
                        <button class="hint-card" onclick="sendHint('帮我总结已入库标准的主要内容')">
                            <span class="hint-icon">📝</span>
                            <span>帮我总结已入库标准的主要内容</span>
                        </button>
                        <button class="hint-card" onclick="sendHint('分析当前标准是否存在内容缺口')">
                            <span class="hint-icon">🔬</span>
                            <span>分析当前标准是否存在内容缺口</span>
                        </button>
                    </div>
                </div>
                <div class="msg-list" id="msgList"></div>
            </div>
            <div class="chat-foot">
                <div class="input-box">
                    <textarea id="chatInput" rows="1" placeholder="输入你的问题..."
                              onkeydown="onInputKey(event)" oninput="autoGrow(this)"></textarea>
                    <button id="sendBtn" class="btn-send" onclick="send()" title="发送">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
                <p class="foot-hint">Enter 发送，Shift+Enter 换行</p>
            </div>
        </div>
    </section>

    <!-- 功能页 -->
    <section class="page" id="page-upload">
        <div class="page-inner">
            <button class="btn-back" onclick="switchPanel('chat')">← 返回</button>
            <h2>上传标准文档</h2>
            <p class="page-sub">支持 PDF、DOCX、TXT 格式，自动解析清洗分块入库</p>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p class="drop-icon">📂</p>
                <p>点击或拖拽文件上传</p>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.docx,.txt" multiple hidden onchange="onFiles(this.files)">
            <div id="pendingArea"></div>
            <div id="docsArea" style="margin-top:24px"></div>
        </div>
    </section>

    <section class="page" id="page-optimize">
        <div class="page-inner">
            <button class="btn-back" onclick="switchPanel('chat')">← 返回</button>
            <h2>文本优化</h2>
            <p class="page-sub">去口语化 · 理顺逻辑 · 统一术语 · 规整格式</p>
            <div class="two-col">
                <div>
                    <label class="field-label">原文</label>
                    <textarea id="optInput" class="field-textarea" placeholder="粘贴需要优化的文案..."></textarea>
                </div>
                <div>
                    <label class="field-label">结果</label>
                    <div id="optResult" class="result-card"></div>
                </div>
            </div>
            <button class="btn-primary" onclick="doOptimize()" style="margin-top:16px">✨ 开始优化</button>
        </div>
    </section>

    <section class="page" id="page-gap">
        <div class="page-inner">
            <button class="btn-back" onclick="switchPanel('chat')">← 返回</button>
            <h2>查漏补缺</h2>
            <p class="page-sub">检索关联标准 · 识别内容缺口 · 给出增补建议</p>
            <div style="display:flex;gap:12px;align-items:center;">
                <select id="gapSelect" class="field-select"></select>
                <button class="btn-primary" onclick="doGap()">🔬 开始分析</button>
            </div>
            <div id="gapResult" class="result-card" style="margin-top:16px"></div>
        </div>
    </section>

    <section class="page" id="page-compliance">
        <div class="page-inner">
            <button class="btn-back" onclick="switchPanel('chat')">← 返回</button>
            <h2>合规自查</h2>
            <p class="page-sub">提交制度/方案 · 对照标准逐条校验</p>
            <div class="two-col">
                <div>
                    <label class="field-label">制度/方案内容</label>
                    <textarea id="complyInput" class="field-textarea" placeholder="粘贴需要校验的内容..."></textarea>
                </div>
                <div>
                    <label class="field-label">校验报告</label>
                    <div id="complyResult" class="result-card"></div>
                </div>
            </div>
            <button class="btn-primary" onclick="doCompliance()" style="margin-top:16px">✅ 开始校验</button>
        </div>
    </section>
</main>

<script src="/static/app.js?v=8"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>if(typeof marked==='undefined'){console.warn('marked CDN failed');}</script>
</body>
</html>
