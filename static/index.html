<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海军标准 RAG 智能体</title>
<link rel="stylesheet" href="/static/style.css?v=21">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-top">
        <div class="brand">
            <span class="brand-icon">⚓</span>
            <span class="brand-text">海军标准智能助手</span>
        </div>
        <button class="btn-new-chat" onclick="newChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新对话
        </button>
        <div class="tool-list">
            <button class="tool-item" data-panel="upload" onclick="switchPanel('upload')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                上传文档
            </button>
        </div>
    </div>
    <div class="sidebar-bottom">
        <div class="history-header">
            <span>历史对话</span>
            <button onclick="clearHistory()" title="清空" class="btn-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</aside>

<main class="main" id="mainArea">

    <!-- 对话页 -->
    <section class="page show" id="page-chat">
        <div class="chat-wrap">
            <div class="chat-body" id="chatBody">
                <div class="welcome" id="welcomeBlock">
                    <h1>您好，我是海军标准智能助手 ⚓</h1>
                    <p class="welcome-desc">严格依托入库标准作答，杜绝编造，强制溯源</p>
                    <div class="hint-grid">
                        <button class="hint-card" onclick="sendHint('舰艇消防系统的设计要求和验收标准是什么？')">
                            <span class="hint-icon">🔍</span><span>舰艇消防系统的设计要求和验收标准是什么？</span>
                        </button>
                        <button class="hint-card" onclick="sendHint('弹药库安全管理有哪些强制性规定？')">
                            <span class="hint-icon">📋</span><span>弹药库安全管理有哪些强制性规定？</span>
                        </button>
                        <button class="hint-card" onclick="sendHint('帮我优化以下公文文本，使其符合海军文书规范')">
                            <span class="hint-icon">✏️</span><span>帮我优化公文文本，使其符合海军文书规范</span>
                        </button>
                        <button class="hint-card" onclick="sendHint('分析当前标准是否存在内容缺口')">
                            <span class="hint-icon">🔬</span><span>分析当前标准是否存在内容缺口</span>
                        </button>
                    </div>
                </div>
                <div class="msg-list" id="msgList"></div>
            </div>
            <div class="chat-foot">
                <!-- 功能模式选择器 -->
                <div class="mode-bar">
                    <button class="mode-btn active" data-mode="chat" onclick="setMode('chat')">💬 智能问答</button>
                    <button class="mode-btn" data-mode="optimize" onclick="setMode('optimize')">✏️ 文本优化</button>
                    <button class="mode-btn" data-mode="gap" onclick="setMode('gap')">🔬 标准分析</button>
                    <button class="mode-btn" data-mode="compliance" onclick="setMode('compliance')">✅ 合规自查</button>
                </div>
                <div class="input-box">
                    <button id="attachBtn" class="btn-attach" title="上传标准文件进行分析" onclick="document.getElementById('gapFileInput').click()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <input type="file" id="gapFileInput" accept=".pdf,.docx,.txt" hidden onchange="onGapFile(this.files)">
                    <textarea id="chatInput" rows="1" placeholder="输入你的问题..."
                              onkeydown="onInputKey(event)" oninput="autoGrow(this)"></textarea>
                    <button id="sendBtn" class="btn-send" onclick="send()" title="发送">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
                <p class="foot-hint" id="footHint">Enter 发送，Shift+Enter 换行</p>
            </div>
        </div>
    </section>

    <!-- 上传页 -->
    <section class="page" id="page-upload">
        <div class="page-inner">
            <button class="btn-back" onclick="switchPanel('chat')">← 返回</button>
            <h2>上传标准文档</h2>
            <p class="page-sub">支持 PDF、DOCX、TXT 格式，自动解析清洗分块入库</p>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p class="drop-icon">📂</p>
                <p>点击选择文件或拖拽到此处</p>
            </div>
            <div style="display:flex;gap:10px;margin-top:10px;align-items:center">
                <label class="btn-folder">
                    📁 上传文件夹
                    <input type="file" id="folderInput" webkitdirectory style="display:none" onchange="onFiles(this.files)">
                </label>
                <span style="font-size:12px;color:var(--text3)">自动筛选 PDF / DOCX / TXT</span>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.docx,.txt" multiple hidden onchange="onFiles(this.files)">
            <div id="pendingArea"></div>
            <div id="docsArea" style="margin-top:24px"></div>
        </div>
    </section>
</main>

<script src="/static/app.js?v=21"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>if(typeof marked==='undefined'){console.warn('marked CDN failed');}</script>
</body>
</html>
